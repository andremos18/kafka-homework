############################# Server Basics ############################## The role of this server. Setting this puts us in KRaf

process.roles=broker,controller

node.id=2

controller.quorum.bootstrap.servers=192.168.0.200:9093,192.168.0.201:9093,192.168.0.202:9093
controller.quorum.voters=1@192.168.0.200:9093,2@192.168.0.201:9093,3@192.168.0.202:9093

############################# Socket Server Settings #############################

listeners=SASL_PLAINTEXT://192.168.0.201:9092,CONTROLLER://192.168.0.201:9093

advertised.listeners=SASL_PLAINTEXT://192.168.0.201:9092

#inter.broker.listener.name=PLAINTEXT
security.inter.broker.protocol=SASL_PLAINTEXT
sasl.mechanism.inter.broker.protocol=PLAIN
sasl.mechanism.controller.protocol=PLAIN
sasl.enabled.mechanisms=PLAIN

authorizer.class.name=org.apache.kafka.metadata.authorizer.StandardAuthorizer
allow.everyone.if.no.acl.found=false
super.users=User:admin

controller.listener.names=CONTROLLER


listener.security.protocol.map=CONTROLLER:SASL_PLAINTEXT,PLAINTEXT:PLAINTEXT,SSL:SSL,SASL_PLAINTEXT:SASL_PLAINTEXT,SASL_SSL:SASL_SSL


num.network.threads=8

num.io.threads=16
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600


############################# Log Basics #############################

log.dirs=/var/lib/kafka-logs

num.partitions=3
default.replication.factor=3
min.insync.replicas=2

num.recovery.threads.per.data.dir=1

############################# Internal Topic Settings  #############################
offsets.topic.replication.factor=1
share.coordinator.state.topic.replication.factor=1


share.coordinator.state.topic.min.isr=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1

############################# Log Flush Policy #############################

#log.flush.interval.messages=10000
#log.flush.interval.ms=1000

############################# Log Retention Policy #############################
log.retention.hours=168
log.retention.bytes=1073741824
log.segment.bytes=1073741824
log.retention.check.interval.ms=300000


metadata.log.dir=/var/lib/kafka-logs/__cluster_metadata
metadata.log.segment.bytes=1073741824
metadata.log.retention.bytes=1073741824
metadata.max.retention.ms=604800000


heap.opts=-Xmx2G -Xms2G


